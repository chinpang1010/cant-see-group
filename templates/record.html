<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What2Wear | Record Outfit</title>
    <link rel="stylesheet" href="/static/record.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="nav-logo">
            <a href="/" class="logo-link">What2Wear</a>
        </div>
        <div class="nav-right">
            <span class="login" id="recordUserLabel">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                student
            </span>
        </div>
    </header>

    <main class="record-container">
        
        <section class="left-panel panel">
            <h2 class="panel-title">Details</h2>
            <form class="record-form" id="recordForm">
                <div class="form-group">
                    <label>Wardrobe</label>
                    <select id="wardrobeSelect">
                        <option value="">Select Wardrobe...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Outfit Name</label>
                    <input type="text" id="outfitName" placeholder="e.g., Campus Comfort" required>
                </div>
                
                <div class="form-group-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="recordDate">
                    </div>
                    <div class="form-group">
                        <label>Season</label>
                        <select id="recordSeason">
                            <option value="Spring">Spring</option>
                            <option value="Summer">Summer</option>
                            <option value="Autumn">Autumn</option>
                            <option value="Winter">Winter</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Weather</label>
                    <select id="recordWeather">
                        <option value="Sunny">Sunny</option>
                        <option value="Cloudy">Cloudy</option>
                        <option value="Rainy">Rainy</option>
                        <option value="Windy">Windy</option>
                        <option value="Snowy">Snowy</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Occasion</label>
                    <select id="recordOccasion">
                        <option value="Casual">Casual</option>
                        <option value="Work">Work</option>
                        <option value="Class">Class</option>
                        <option value="Date">Date</option>
                        <option value="Party">Party</option>
                        <option value="Formal">Formal</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Mood</label>
                    <input type="text" id="recordMood" placeholder="e.g., Happy">
                </div>

                <div class="form-group">
                    <label>Rating</label>
                    <div class="stars">
                        <span>☆</span><span>☆</span><span>☆</span><span>☆</span><span>☆</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="recordNote" rows="4" placeholder="Write down your thoughts about this outfit..."></textarea>
                </div>
            </form>
        </section>

        <section class="mid-panel panel">
            <h2 class="panel-title">Your Closet</h2>
            <div class="record-filter-row">
                <input type="search" id="recordSearchInput" placeholder="Search clothes...">
                <select id="recordCategoryFilter"><option value="">All</option></select>
            </div>
            <div class="clothes-grid">
                <div class="no-items">Loading clothes...</div>
            </div>
        </section>

        <section class="right-panel panel">
            <h2 class="panel-title">Outfit Canvas</h2>
            
            <div class="canvas-area">
                <p>Click clothes left to add</p>
            </div>

            <div class="upload-section-minimal">
                <label class="minimal-upload-btn">
                    <span id="uploadIconWrapper">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </span>
                    <span id="uploadText">Upload Photo</span>
                    <input type="file" id="photoUpload" accept="image/*" style="display: none;">
                </label>
            </div>

            <button class="save-btn" id="saveRecordBtn" form="recordForm">Save Record</button>

            <div class="record-history">
                <h3>Recent Records</h3>
                <div id="recordHistory"></div>
            </div>
        </section>

    </main>

    <script src="/static/record.js"></script>
</body>
</html>
